<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>LINE Shop Admin</title>
    <!-- Google Fonts (Noto Sans Thai) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #16161f;
            --bg4: #1c1c28;
            --border: #2a2a3a;
            --accent: #facc15;
            --purple: oklch(70.5% 0.015 286.067);
            --text: #fff;
            --text2: #a0a0b8;
            --text3: #6b6b85;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --orange: #f97316;
            --r: 10px;
            --r2: 14px
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999
        }

        .login-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 40px 36px;
            width: 340px;
            text-align: center
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 16px
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px
        }

        .login-sub {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 28px
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden
        }

        .sidebar {
            width: 230px;
            min-width: 230px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto
        }

        .logo-wrap {
            padding: 20px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0
        }

        .logo-text {
            font-size: 15px;
            font-weight: 700
        }

        .logo-ver {
            font-size: 10px;
            color: var(--purple)
        }

        .nav {
            padding: 12px 0;
            flex: 1
        }

        .nav-sec {
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 18px 4px
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            cursor: pointer;
            transition: .2s;
            border-left: 3px solid transparent;
            font-size: 14px;
            color: var(--text2)
        }

        .nav-item:hover {
            background: var(--bg3);
            color: var(--text)
        }

        .nav-item.active {
            background: var(--bg4);
            color: var(--accent);
            border-left-color: var(--accent)
        }

        .nav-icon {
            font-size: 16px;
            width: 20px;
            text-align: center
        }

        .nav-badge {
            margin-left: auto;
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .topbar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .topbar-title {
            font-size: 17px;
            font-weight: 700
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg)
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 13px;
            font-weight: 700;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none
        }

        .btn-primary {
            background: var(--accent);
            color: #000
        }

        .btn-primary:hover {
            background: #fbbf24
        }

        .btn-secondary {
            background: var(--bg4);
            color: var(--text);
            border: 1px solid var(--border)
        }

        .btn-secondary:hover {
            background: var(--bg3)
        }

        .btn-danger {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b
        }

        .btn-danger:hover {
            background: #991b1b
        }

        .btn-success {
            background: #14532d;
            color: #86efac;
            border: 1px solid #166534
        }

        .btn-success:hover {
            background: #166534
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 26px;
            cursor: pointer;
            flex-shrink: 0
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: #2a2a3a;
            border-radius: 26px;
            transition: .3s
        }

        .toggle input:checked+.toggle-track {
            background: var(--accent)
        }

        .toggle-thumb {
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .3s;
            pointer-events: none
        }

        .toggle input:checked~.toggle-thumb {
            transform: translateX(18px)
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 24px
        }

        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 18px 16px;
            position: relative;
            overflow: hidden
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -10px;
            right: -10px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            opacity: .12
        }

        .sc-gold::after {
            background: var(--accent)
        }

        .sc-purple::after {
            background: var(--purple)
        }

        .sc-green::after {
            background: var(--green)
        }

        .sc-blue::after {
            background: var(--blue)
        }

        .sc-orange::after {
            background: var(--orange)
        }

        .stat-icon {
            font-size: 22px;
            margin-bottom: 8px
        }

        .stat-label {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 6px
        }

        .stat-val {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 3px;
            word-break: break-all
        }

        .sv-gold {
            color: var(--accent)
        }

        .sv-purple {
            color: var(--purple)
        }

        .sv-green {
            color: var(--green)
        }

        .sv-blue {
            color: var(--blue)
        }

        .sv-orange {
            color: var(--orange)
        }

        .stat-sub {
            font-size: 11px;
            color: var(--text3)
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 18px
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px
        }

        .card-title {
            font-size: 14px;
            font-weight: 700
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 110px
        }

        .bar-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px
        }

        .bar-val {
            font-size: 9px;
            font-weight: 700;
            color: var(--text2)
        }

        .bar {
            width: 100%;
            border-radius: 4px 4px 0 0;
            min-height: 4px
        }

        .bar-label {
            font-size: 9px;
            color: var(--text3)
        }

        .bar-sales {
            background: linear-gradient(180deg, var(--accent) 0%, #d97706 100%)
        }

        .bar-topup {
            background: linear-gradient(180deg, var(--purple) 0%, #4f46e5 100%)
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: var(--r)
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 600px
        }

        th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text3);
            font-size: 11px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: .5px;
            white-space: nowrap
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1a1a26;
            color: var(--text2);
            vertical-align: middle
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02)
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap
        }

        .badge-success {
            background: #14532d;
            color: #86efac
        }

        .badge-warning {
            background: #713f12;
            color: #fde68a
        }

        .badge-danger {
            background: #7f1d1d;
            color: #fca5a5
        }

        .badge-info {
            background: #1e3a5f;
            color: #93c5fd
        }

        .badge-purple {
            background: #2e1065;
            color: var(--purple)
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .form-group.full {
            grid-column: 1/-1
        }

        .form-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text2)
        }

        .form-input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            color: var(--text);
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 13px;
            outline: none;
            transition: .2s;
            width: 100%
        }

        .form-input:focus {
            border-color: var(--accent)
        }

        .form-input::placeholder {
            color: var(--text3)
        }

        select.form-input option {
            background: var(--bg3)
        }

        textarea.form-input {
            resize: vertical;
            min-height: 70px
        }

        .img-preview {
            width: 100%;
            height: 80px;
            background: var(--bg3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 12px;
            color: var(--text3);
            margin-top: 4px
        }

        .img-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px)
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 24px;
            width: 520px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: var(--bg4);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            color: var(--text2);
            display: flex;
            align-items: center;
            justify-content: center
        }

        .modal-close:hover {
            color: var(--text)
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border)
        }

        .item-list {
            display: grid;
            gap: 10px
        }

        .item-row {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .item-thumb {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0
        }

        .item-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .item-info {
            flex: 1;
            min-width: 0
        }

        .item-name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .item-detail {
            font-size: 11px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .item-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: .2s;
            color: var(--text2)
        }

        .icon-btn:hover {
            background: var(--bg2)
        }

        .icon-btn.edit:hover {
            border-color: #3b82f6;
            color: #3b82f6
        }

        .icon-btn.del:hover {
            border-color: #ef4444;
            color: #ef4444
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px
        }

        .tab {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: var(--text3);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: .2s
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent)
        }

        .tab:hover {
            color: var(--text2)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 12px 18px;
            font-size: 13px;
            z-index: 9999;
            display: none;
            gap: 8px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5)
        }

        .toast.show {
            display: flex
        }

        .toast.success {
            border-color: var(--green);
            color: var(--green)
        }

        .toast.error {
            border-color: var(--red);
            color: var(--red)
        }

        .status-select {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            color: var(--text);
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 12px;
            cursor: pointer
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text3);
            font-size: 14px
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin-right: 8px;
            vertical-align: middle
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .hidden {
            display: none !important
        }

        @media (max-width: 1024px) {
            .stat-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                min-width: 60px;
            }

            .logo-wrap .logo-text,
            .logo-ver,
            .nav-sec,
            .nav-item span:not(.nav-icon) {
                display: none;
            }

            .nav-item {
                justify-content: center;
            }

            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">🛒</div>
            <div class="login-title">LINE Shop Admin</div>
            <div class="login-sub">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบ</div>
            <input type="password" id="login-pwd" class="form-input" placeholder="รหัสผ่าน" style="margin-bottom:12px">
            <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">🔓
                เข้าสู่ระบบ</button>
            <p id="login-err" style="color:var(--red);font-size:12px;margin-top:10px;display:none">รหัสผ่านไม่ถูกต้อง
            </p>
            <p style="color:var(--text3);font-size:10px;margin-top:16px" id="env-hint">Environment: กำลังตรวจสอบ...</p>
            <div id="login-loading" style="display:none;margin-top:10px"><span
                    class="spinner"></span>กำลังเข้าสู่ระบบ...</div>
        </div>
    </div>

    <!-- APP -->
    <div class="app hidden" id="app">
        <div class="sidebar">
            <div class="logo-wrap">
                <div class="logo-icon">🛒</div>
                <div>
                    <div class="logo-text">LINE Shop</div>
                    <div class="logo-ver">Admin Panel v2.1</div>
                </div>
            </div>
            <div class="nav">
                <div class="nav-sec">หลัก</div>
                <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span>Dashboard</div>
                <div class="nav-sec">จัดการสินค้า</div>
                <div class="nav-item" data-page="categories"><span class="nav-icon">🏷️</span>หมวดหมู่</div>
                <div class="nav-item" data-page="products"><span class="nav-icon">📦</span>สินค้า</div>
                <div class="nav-sec">การชำระเงิน</div>
                <div class="nav-item" data-page="banks"><span class="nav-icon">🏦</span>ธนาคาร</div>
                <div class="nav-item" data-page="wallets"><span class="nav-icon">💳</span>True Wallet</div>
                <div class="nav-sec">รายงาน</div>
                <div class="nav-item" data-page="orders"><span class="nav-icon">🧾</span>ประวัติการขาย<span
                        class="nav-badge" id="pending-badge" style="display:none">0</span></div>
            </div>
        </div>
        <div class="main">
            <div class="topbar">
                <span class="topbar-title" id="page-title">📊 Dashboard</span>
                <div class="topbar-right">
                    <button class="btn btn-primary hidden" id="add-btn" onclick="openAddModal()">＋ เพิ่มข้อมูล</button>
                    <button class="btn btn-secondary btn-sm" onclick="refreshPage()">🔄 รีเฟรช</button>
                    <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>
            <div class="content" id="content">
                <div class="loading"><span class="spinner"></span>กำลังโหลด...</div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">เพิ่มข้อมูล</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
                <button class="btn btn-primary" id="modal-save" onclick="saveModal()">💾 บันทึก</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== CONFIGURATION =====
        // ⚠️ เปลี่ยน URL นี้เป็น Cloudflare Worker URL ของคุณ (หรือ GAS URL โดยตรงถ้าไม่ใช้ Worker)
        const GAS_WEBAPP_URL = 'https://muddy-union-755b.sampan082.workers.dev/';
        // ตัวอย่าง: 'https://line-shop-proxy.myusername.workers.dev'
        // หรือถ้าใช้ GAS โดยตรง: 'https://script.google.com/macros/s/YOUR_DEPLOYED_ID/exec'

        // โหมดการทำงาน
        let isGAS = false;
        let gasChecked = false;

        // ===== ตรวจสอบการเชื่อมต่อ GAS =====
        async function checkGASConnection() {
            try {
                const res = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'initSheets', args: [] }),
                    redirect: 'follow'
                });
                const data = await res.json();
                if (data && (data.success || data.message)) {
                    isGAS = true;
                    document.getElementById('env-hint').textContent = 'Environment: Google Apps Script ✅ (เชื่อมต่อสำเร็จ)';
                    console.log('GAS Connected!');
                    return true;
                }
            } catch (e) {
                console.log('GAS not available, using Demo Mode:', e.message);
            }
            isGAS = false;
            document.getElementById('env-hint').textContent = 'Environment: Demo Mode ⚠️ (รหัสผ่าน: admin1234)';
            return false;
        }

        // ตรวจสอบ GAS ทันทีที่โหลดหน้า
        checkGASConnection();

        // ===== MOCK DATA (fallback สำหรับ Demo Mode) =====
        const MOCK = {
            stats: {
                todaySales: 0,
                monthSales: 0,
                totalSales: 0,
                totalUsers: 0,
                todayTopup: 0,
                monthTopup: 0,
                totalTopup: 0,
                salesChart: [],
                topupChart: [],
                _orders: []
            },
            cats: [],
            prods: [],
            banks: [],
            wallets: [],
            orders: []
        };

        // ===== GAS CALL WRAPPER =====
        async function gasCall(fnName, args, onSuccess) {
            if (isGAS) {
                // เรียก GAS Web App จริง (ผ่าน Worker Proxy)
                try {
                    console.log(`[GAS] Calling ${fnName}...`);
                    const res = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: fnName, args: args }),
                        redirect: 'follow'
                    });
                    const data = await res.json();
                    console.log(`[GAS] ${fnName} response:`, data);
                    onSuccess(data);
                } catch (err) {
                    console.error('GAS call error:', err);
                    showToast('❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                    onSuccess({ error: err.message });
                }
            } else {
                // Mock call (Demo Mode)
                console.log(`[Mock] Calling ${fnName} with args:`, args);
                setTimeout(() => {
                    const result = mockGetData(fnName, args);
                    if (result instanceof Promise) {
                        result.then(onSuccess);
                    } else {
                        onSuccess(result);
                    }
                }, 300);
            }
        }

        function mockGetData(fnName, args) {
            switch (fnName) {
                case 'adminGetStats':
                    return { ...MOCK.stats, _orders: MOCK.orders || [] };
                case 'adminGetCategories':
                    return [...MOCK.cats];
                case 'adminGetProducts':
                    return [...MOCK.prods];
                case 'adminGetBanks':
                    return [...MOCK.banks];
                case 'adminGetWallets':
                    return [...MOCK.wallets];
                case 'adminGetOrders':
                    return [...MOCK.orders].reverse();
                case 'adminSaveCategory':
                    return mockSave('cats', args[0]);
                case 'adminSaveProduct':
                    return mockSave('prods', args[0]);
                case 'adminSaveBank':
                    return mockSave('banks', args[0]);
                case 'adminSaveWallet':
                    return mockSave('wallets', args[0]);
                case 'adminDeleteCategory':
                    return mockDelete('cats', args[0]);
                case 'adminDeleteProduct':
                    return mockDelete('prods', args[0]);
                case 'adminDeleteBank':
                    return mockDelete('banks', args[0]);
                case 'adminDeleteWallet':
                    return mockDelete('wallets', args[0]);
                case 'adminUpdateOrderStatus':
                    return mockUpdateOrderStatus(args[0], args[1]);
                default:
                    return { error: 'Unknown function: ' + fnName };
            }
        }

        function mockSave(collection, data) {
            if (data.id) {
                const idx = MOCK[collection].findIndex(item => String(item.id) === String(data.id));
                if (idx >= 0) {
                    MOCK[collection][idx] = { ...MOCK[collection][idx], ...data };
                }
            } else {
                const newItem = { ...data, id: 'NEW' + Date.now(), createdAt: new Date().toISOString() };
                MOCK[collection].push(newItem);
            }
            return { success: true };
        }

        function mockDelete(collection, id) {
            const idx = MOCK[collection].findIndex(item => String(item.id) === String(id));
            if (idx >= 0) {
                MOCK[collection].splice(idx, 1);
                return { success: true };
            }
            return { error: 'Not found' };
        }

        function mockUpdateOrderStatus(id, status) {
            const idx = MOCK.orders.findIndex(o => String(o.id) === String(id));
            if (idx >= 0) {
                MOCK.orders[idx].status = status;
                MOCK.orders[idx].updatedAt = new Date().toISOString();
            }
            return { success: true };
        }

        // ===== STATE =====
        const S = {
            page: 'dashboard', pwd: '', editId: null,
            cats: [], prods: [], banks: [], wallets: [], orders: [],
            stats: null
        };

        // ===== LOGIN =====
        async function doLogin() {
            const pwd = document.getElementById('login-pwd').value;
            const errEl = document.getElementById('login-err');
            const loadingEl = document.getElementById('login-loading');

            if (!pwd) {
                errEl.style.display = 'block';
                errEl.textContent = 'กรุณาใส่รหัสผ่าน';
                return;
            }

            // แสดง loading
            loadingEl.style.display = 'block';
            errEl.style.display = 'none';

            S.pwd = pwd;

            if (isGAS) {
                // โหมด GAS - ตรวจสอบรหัสผ่านผ่าน API

                    console.log('[Login] Checking password via GAS...');
                    const res = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'adminAuth', args: [pwd] }),
                        redirect: 'follow'
                    });
                    const result = await res.json();
                    console.log('[Login] GAS response:', result);

                    loadingEl.style.display = 'none';

                    if (result === true || (result && result.success)) {
                        // Login สำเร็จ
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('app').classList.remove('hidden');
                        loadPage('dashboard');
                    } else {
                        errEl.style.display = 'block';
                        errEl.textContent = 'รหัสผ่านไม่ถูกต้อง (ค่าเริ่มต้น: admin1234)';
                    }
                } catch (err) {
                    console.error('[Login] Error:', err);
                    loadingEl.style.display = 'none';
                    errEl.style.display = 'block';
                    errEl.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ ลองใหม่';
                }
            } else {
                // Demo Mode - ตรวจสอบรหัสผ่านในเครื่อง
                setTimeout(() => {
                    loadingEl.style.display = 'none';

                    if (pwd === 'admin1234' || pwd === 'demo') {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('app').classList.remove('hidden');
                        loadPage('dashboard');
                    } else {
                        errEl.style.display = 'block';
                        errEl.textContent = 'รหัสผ่านไม่ถูกต้อง (Demo Mode: admin1234)';
                    }
                }, 500);
            }
        }

        // กด Enter เพื่อ Login
        document.getElementById('login-pwd').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doLogin();
        });

        function logout() {
            S.pwd = '';
            document.getElementById('login-screen').classList.remove('hidden');

        // ===== NAVIGATION =====
        document.querySelectorAll('.nav-item[data-page]').forEach(el => {
            el.addEventListener('click', () => loadPage(el.dataset.page));
        });

            dashboard: '📊 Dashboard',
            categories: '🏷️ หมวดหมู่สินค้า',
            products: '📦 สินค้า',
            banks: '🏦 ธนาคาร',
            wallets: '💳 True Wallet',
            orders: '🧾 ประวัติการขาย'
        };
        const ADD_LABELS = {
            categories: '＋ เพิ่มหมวดหมู่', products: '＋ เพิ่มสินค้า', banks: '＋ เพิ่มธนาคาร',
            wallets: '＋ เพิ่ม True Wallet'
        };

        function loadPage(page) {
            S.page = page;
            S.editId = null;
            document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page === page));
            document.getElementById('page-title').textContent = PAGE_TITLES[page];
            const addBtn = document.getElementById('add-btn');

                addBtn.textContent = ADD_LABELS[page];
                addBtn.classList.remove('hidden');
            } else addBtn.classList.add('hidden');
            setContent('<div class="loading"><span class="spinner"></span>กำลังโหลด...</div>');
            switch (page) {
                case 'dashboard': loadDashboard(); break;
                case 'categories': loadCategories(); break;
                case 'products': loadProducts(); break;
                case 'banks': loadBanks(); break;
                case 'wallets': loadWallets(); break;
                case 'orders': loadOrders(); break;

        }

        function refreshPage() { loadPage(S.page); }
        function setContent(html) { document.getElementById('content').innerHTML = html; }

        // ===== DASHBOARD =====
        function loadDashboard() {
            gasCall('adminGetStats', [S.pwd], stats => {
                if (stats.error) {
                    setContent('<div class="loading">❌ ' + stats.error + '</div>'); return;
                }
                S.stats = stats;
                const salesChart = stats.salesChart || [];
                const topupChart = stats.topupChart || [];
                const maxS = Math.max(...salesChart.map(d => d.value || 0), 1);
                const maxT = Math.max(...topupChart.map(d => d.value || 0), 1);

                const bars = (data, cls, max) => (data || []).map(d => `
      <div class="bar-col">
        <span class="bar-val">฿${(d.value || 0).toLocaleString()}</span>
        <div class="bar bar-${cls}" style="height:${Math.max(Math.round((d.value || 0) / max * 90), (d.value || 0) > 0 ? 4 : 2)}px"></div>
        <span class="bar-label">${d.label || ''}</span>
      </div>`).join('');

                setContent(`
    <div class="stat-grid">
      <div class="stat-card sc-gold"><div class="stat-icon">💰</div><div class="stat-label">รายได้วันนี้</div><div class="stat-val sv-gold">฿${(stats.todaySales || 0).toLocaleString()}</div></div>
      <div class="stat-card sc-purple"><div class="stat-icon">📅</div><div class="stat-label">รายได้เดือนนี้</div><div class="stat-val sv-purple">฿${(stats.monthSales || 0).toLocaleString()}</div></div>
      <div class="stat-card sc-blue"><div class="stat-icon">👥</div><div class="stat-label">ผู้ใช้งาน</div><div class="stat-val sv-blue">${(stats.totalUsers || 0).toLocaleString()}</div></div>

      <div class="stat-card sc-orange"><div class="stat-icon">📆</div><div class="stat-label">เติมเงินเดือนนี้</div><div class="stat-val sv-orange">฿${(stats.monthTopup || 0).toLocaleString()}</div></div>

        <div class="bar-chart">${bars(topupChart, 'topup', maxT)}</div>

            });

        // ===== CATEGORIES =====
        function loadCategories() {
            gasCall('adminGetCategories', [], data => {
                S.cats = data || [];

        function renderCategories() {

        <span class="badge ${c.active === 'true' || c.active === true ? 'badge-success' : 'badge-danger'}">${c.active === 'true' || c.active === true ? 'เปิด' : 'ปิด'}</span>

        // ===== PRODUCTS =====
        function loadProducts() {
            gasCall('adminGetProducts', [], prods => {
                S.prods = prods || [];
                gasCall('adminGetCategories', [], cats => {
                    S.cats = cats || [];

                    renderProducts();

        function renderProducts() {

                const price = p.discountPrice > 0 ? p.discountPrice : p.price;

          <div class="item-thumb">${p.img ? `<img src="${p.img}" onerror="this.style.display='none'">` : '📦'}</div>

            <div class="item-name">${escHtml(p.name)} <span class="badge badge-info" style="font-size:10px">${cat ? escHtml(cat.name) : '-'}</span></div>

                if (!S.wallets.length) {

        // ===== ORDERS =====
        function loadOrders() {
            gasCall('adminGetOrders', [S.pwd], data => {
                S.orders = data || [];
                const pendingCnt = S.orders.filter(o => o.status === 'รอชำระ' || o.status === 'รอตรวจสลิป').length;
                const badge = document.getElementById('pending-badge');
                if (pendingCnt > 0) {
                    badge.textContent = pendingCnt;

                const tabs = ['ทั้งหมด', 'รอชำระ', 'รอตรวจสลิป', 'สำเร็จ', 'ยกเลิก'];
                const renderOrders = (tab) => {
                    const filtered = tab === 'ทั้งหมด' ? S.orders : S.orders.filter(o => o.status === tab);
                    document.getElementById('order-table-wrap').innerHTML = filtered.length ?
                        `<div class="table-wrap">${orderTable(filtered, true)}</div>` :
                        '<div class="loading" style="padding:30px">ไม่มีรายการ</div>';
                    document.querySelectorAll('.order-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

                setContent(`
      <div class="tabs" id="order-tabs">
        ${tabs.map(t => `<div class="tab order-tab" data-tab="${t}">${t}</div>`).join('')}

      <div id="order-table-wrap"></div>`);

                document.querySelectorAll('.order-tab').forEach(t => t.addEventListener('click', () => renderOrders(t.dataset.tab)));
                renderOrders('ทั้งหมด');

        function orderTable(data, showActions) {
            if (!data || !data.length) return '<div class="loading" style="padding:20px">ไม่มีรายการ</div>';
            const statusBadge = s => s === 'สำเร็จ' ? 'badge-success' : s === 'รอชำระ' ? 'badge-warning' : s === 'รอตรวจสลิป' ? 'badge-info' : 'badge-danger';
            return `<table>
    <tr><th>ออเดอร์</th><th>ลูกค้า</th><th>สินค้า</th><th>ยอด</th><th>สถานะ</th><th>วันที่</th>${showActions ? '<th>จัดการ</th>' : ''}</tr>
    ${data.map(o => `<tr>
      <td><span style="color:var(--accent);font-size:11px;font-weight:700">${escHtml(o.id || '')}</span></td>
      <td>${escHtml(o.displayName || o.userId || '')}</td>
      <td>${escHtml(o.productName || '')} <span style="color:var(--text3);font-size:11px">×${o.qty || 1}</span></td>
      <td style="color:var(--accent);font-weight:700">฿${Number(o.totalPrice || 0).toLocaleString()}</td>
      <td><span class="badge ${statusBadge(o.status)}">${o.status || ''}</span></td>
      <td style="color:var(--text3);font-size:11px">${String(o.createdAt || '').slice(0, 10)}</td>
      ${showActions ? `<td>
        <select class="status-select" onchange="updateOrderStatus('${o.id}',this.value)">
          <option ${o.status === 'รอชำระ' ? 'selected' : ''}>รอชำระ</option>
          <option ${o.status === 'รอตรวจสลิป' ? 'selected' : ''}>รอตรวจสลิป</option>
          <option ${o.status === 'สำเร็จ' ? 'selected' : ''}>สำเร็จ</option>
          <option ${o.status === 'ยกเลิก' ? 'selected' : ''}>ยกเลิก</option>
        </select>
      </td>`: ''}
    </tr>`).join('')}
  </table>`;
        }

        function updateOrderStatus(id, status) {
            gasCall('adminUpdateOrderStatus', [id, status, S.pwd], r => {
                if (r && r.error) { showToast('❌ ' + r.error, 'error'); return; }
                showToast('✅ อัปเดตสถานะแล้ว', 'success');
                loadOrders();
            });
        }

        // ===== TOGGLE =====
        function toggleActive(type, id, val) {
            const src = { cat: S.cats, prod: S.prods, bank: S.banks, wallet: S.wallets }[type];
            const item = src.find(i => String(i.id) === String(id));
            if (!item) return;
            item.active = String(val);
            const fnMap = {
                cat: 'adminSaveCategory', prod: 'adminSaveProduct', bank: 'adminSaveBank',
                wallet: 'adminSaveWallet'
            };
            gasCall(fnMap[type], [item, S.pwd], r => {
                if (r && r.error) { showToast('❌ ' + r.error, 'error'); return; }
                showToast('✅ อัปเดตแล้ว', 'success');
            });
        }

        // ===== MODAL =====
        function openAddModal() {
            S.editId = null;
            buildModal();
        }

        function openEditModal(type, id) {
            S.editId = id;
            const src = { cat: S.cats, prod: S.prods, bank: S.banks, wallet: S.wallets }[{
                categories: 'cat', products: 'prod', banks: 'bank', wallets: 'wallet'
            }[S.page] || type];
            buildModal(src?.find(i => String(i.id) === String(id)));
        }

        function buildModal(data) {
            const isEdit = !!data;
            const titles = { categories: 'หมวดหมู่', products: 'สินค้า', banks: 'ธนาคาร', wallets: 'True Wallet' };
            document.getElementById('modal-title').textContent = (isEdit ? 'แก้ไข' : 'เพิ่ม') + titles[S.page];
            document.getElementById('modal-body').innerHTML = getModalForm(data);
            document.getElementById('modal').classList.remove('hidden');
        }

        function getModalForm(d) {
            d = d || {};
            if (S.page === 'categories') {
                return `<div class="form-grid">
      <div class="form-group full"><label class="form-label">ชื่อหมวดหมู่ *</label><input class="form-input" id="f-name" value="${escHtml(d.name || '')}" placeholder="เช่น เครื่องดื่ม"></div>
      <div class="form-group full"><label class="form-label">URL รูปภาพ</label><input class="form-input" id="f-img" value="${escHtml(d.img || '')}" placeholder="https://..." oninput="updateImgPreview('prev-img',this.value)"><div class="img-preview" id="prev-img">${d.img ? `<img src="${d.img}">` : 'ใส่ URL เพื่อดูตัวอย่าง'}</div></div>
      <div class="form-group full"><label class="form-label">คีย์เวิร์ด * (คั่นด้วยคอมม่า)</label><input class="form-input" id="f-keyword" value="${escHtml(String(d.keyword || ''))}" placeholder="drink,เครื่องดื่ม,coffee"></div>
      <div class="form-group"><label class="form-label">สถานะ</label><div class="toggle-wrap" style="margin-top:4px"><label class="toggle"><input type="checkbox" id="f-active" ${d.active === 'true' || d.active === true || d.active === undefined ? 'checked' : ''}><div class="toggle-track"></div><div class="toggle-thumb"></div></label><span style="font-size:13px;color:var(--text2)">เปิดใช้งาน</span></div></div>
    </div>`;
            }
            if (S.page === 'products') {
                const catOpts = S.cats.map(c => `<option value="${c.id}" ${String(d.catId) === String(c.id) ? 'selected' : ''}>${escHtml(c.name)}</option>`).join('');
                return `<div class="form-grid">
      <div class="form-group full"><label class="form-label">ชื่อสินค้า *</label><input class="form-input" id="f-name" value="${escHtml(d.name || '')}" placeholder="ชื่อสินค้า"></div>
      <div class="form-group full"><label class="form-label">URL รูปภาพ</label><input class="form-input" id="f-img" value="${escHtml(d.img || '')}" placeholder="https://..." oninput="updateImgPreview('prev-img',this.value)"><div class="img-preview" id="prev-img">${d.img ? `<img src="${d.img}">` : 'ใส่ URL เพื่อดูตัวอย่าง'}</div></div>
      <div class="form-group full"><label class="form-label">รายละเอียด</label><textarea class="form-input" id="f-desc" placeholder="รายละเอียดสินค้า...">${escHtml(d.desc || '')}</textarea></div>
      <div class="form-group"><label class="form-label">ราคาปกติ (฿) *</label><input class="form-input" id="f-price" type="number" value="${d.price || ''}" placeholder="0"></div>
      <div class="form-group"><label class="form-label">ราคาส่วนลด (฿)</label><input class="form-input" id="f-discountPrice" type="number" value="${d.discountPrice || 0}" placeholder="0"></div>
      <div class="form-group"><label class="form-label">หมวดหมู่ *</label><select class="form-input" id="f-catId"><option value="">-- เลือก --</option>${catOpts}</select></div>
      <div class="form-group"><label class="form-label">สถานะ</label><div class="toggle-wrap" style="margin-top:4px"><label class="toggle"><input type="checkbox" id="f-active" ${d.active === 'true' || d.active === true || d.active === undefined ? 'checked' : ''}><div class="toggle-track"></div><div class="toggle-thumb"></div></label><span style="font-size:13px;color:var(--text2)">เปิดใช้งาน</span></div></div>
    </div>`;
            }
            if (S.page === 'banks') {
                return `<div class="form-grid">
      <div class="form-group"><label class="form-label">ชื่อบัญชี *</label><input class="form-input" id="f-accountName" value="${escHtml(d.accountName || '')}" placeholder="ชื่อ-นามสกุล"></div>
      <div class="form-group"><label class="form-label">ชื่อธนาคาร *</label><input class="form-input" id="f-bankName" value="${escHtml(d.bankName || '')}" placeholder="กสิกรไทย, ไทยพาณิชย์..."></div>
      <div class="form-group full"><label class="form-label">เลขบัญชี *</label><input class="form-input" id="f-accountNumber" value="${escHtml(d.accountNumber || '')}" placeholder="xxx-x-xxxxx-x"></div>
      <div class="form-group full"><label class="form-label">URL รูปภาพ</label><input class="form-input" id="f-img" value="${escHtml(d.img || '')}" placeholder="https://..." oninput="updateImgPreview('prev-img',this.value)"><div class="img-preview" id="prev-img">${d.img ? `<img src="${d.img}">` : 'ใส่ URL เพื่อดูตัวอย่าง'}</div></div>
      <div class="form-group"><label class="form-label">สถานะ</label><div class="toggle-wrap" style="margin-top:4px"><label class="toggle"><input type="checkbox" id="f-active" ${d.active === 'true' || d.active === true || d.active === undefined ? 'checked' : ''}><div class="toggle-track"></div><div class="toggle-thumb"></div></label><span style="font-size:13px;color:var(--text2)">เปิดใช้งาน</span></div></div>
    </div>`;
            }
            if (S.page === 'wallets') {
                return `<div class="form-grid">
      <div class="form-group full"><label class="form-label">ชื่อบัญชี *</label><input class="form-input" id="f-accountName" value="${escHtml(d.accountName || '')}" placeholder="ชื่อบัญชี True Wallet"></div>
      <div class="form-group full"><label class="form-label">เบอร์โทร *</label><input class="form-input" id="f-accountNumber" value="${escHtml(d.accountNumber || '')}" placeholder="08x-xxx-xxxx"></div>
      <div class="form-group full"><label class="form-label">URL รูปภาพ</label><input class="form-input" id="f-img" value="${escHtml(d.img || '')}" placeholder="https://..." oninput="updateImgPreview('prev-img',this.value)"><div class="img-preview" id="prev-img">${d.img ? `<img src="${d.img}">` : 'ใส่ URL เพื่อดูตัวอย่าง'}</div></div>
      <div class="form-group"><label class="form-label">สถานะ</label><div class="toggle-wrap" style="margin-top:4px"><label class="toggle"><input type="checkbox" id="f-active" ${d.active === 'true' || d.active === true || d.active === undefined ? 'checked' : ''}><div class="toggle-track"></div><div class="toggle-thumb"></div></label><span style="font-size:13px;color:var(--text2)">เปิดใช้งาน</span></div></div>
    </div>`;
            }
            return '';
        }

        function saveModal() {
            const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
            const getChk = id => { const el = document.getElementById(id); return el ? String(el.checked) : 'true'; };
            let data = { id: S.editId || '' };

            if (S.page === 'categories') {
                if (!get('f-name').trim()) { showToast('❌ กรุณาใส่ชื่อหมวดหมู่', 'error'); return; }
                if (!get('f-keyword').trim()) { showToast('❌ กรุณาใส่คีย์เวิร์ด', 'error'); return; }
                Object.assign(data, { name: get('f-name'), img: get('f-img'), keyword: get('f-keyword'), active: getChk('f-active') });
                gasCall('adminSaveCategory', [data, S.pwd], onSaveSuccess);
            } else if (S.page === 'products') {
                if (!get('f-name').trim()) { showToast('❌ กรุณาใส่ชื่อสินค้า', 'error'); return; }
                if (!get('f-catId')) { showToast('❌ กรุณาเลือกหมวดหมู่', 'error'); return; }
                Object.assign(data, { name: get('f-name'), img: get('f-img'), desc: get('f-desc'), price: Number(get('f-price')) || 0, discountPrice: Number(get('f-discountPrice')) || 0, catId: get('f-catId'), active: getChk('f-active') });
                gasCall('adminSaveProduct', [data, S.pwd], onSaveSuccess);
            } else if (S.page === 'banks') {
                if (!get('f-accountName').trim() || !get('f-bankName').trim() || !get('f-accountNumber').trim()) { showToast('❌ กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
                Object.assign(data, { accountName: get('f-accountName'), bankName: get('f-bankName'), accountNumber: get('f-accountNumber'), img: get('f-img'), active: getChk('f-active') });
                gasCall('adminSaveBank', [data, S.pwd], onSaveSuccess);
            } else if (S.page === 'wallets') {
                if (!get('f-accountName').trim() || !get('f-accountNumber').trim()) { showToast('❌ กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
                Object.assign(data, { accountName: get('f-accountName'), accountNumber: get('f-accountNumber'), img: get('f-img'), active: getChk('f-active') });
                gasCall('adminSaveWallet', [data, S.pwd], onSaveSuccess);
            }
        }

        function onSaveSuccess(r) {
            if (r && r.error) { showToast('❌ ' + r.error, 'error'); return; }
            showToast('✅ บันทึกสำเร็จ', 'success');
            closeModal();
            loadPage(S.page);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            S.editId = null;
        }

        // ===== DELETE =====
        function deleteItem(type, id, name) {
            if (!confirm(`ต้องการลบ "${name}" ใช่ไหม?`)) return;
            const fnMap = { cat: 'adminDeleteCategory', prod: 'adminDeleteProduct', bank: 'adminDeleteBank', wallet: 'adminDeleteWallet' };
            gasCall(fnMap[type], [id, S.pwd], r => {
                if (r && r.error) { showToast('❌ ' + r.error, 'error'); return; }
                showToast('✅ ลบสำเร็จ', 'success');
                loadPage(S.page);
            });
        }

        // ===== HELPERS =====
        function updateImgPreview(previewId, url) {
            const el = document.getElementById(previewId);
            if (!el) return;
            el.innerHTML = url ? `<img src="${url}" onerror="this.parentNode.innerHTML='URL ไม่ถูกต้อง'">` : 'ใส่ URL เพื่อดูตัวอย่าง';
        }

        function escHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${type}`;
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', function (e) { if (e.target === this) closeModal(); });

        // Init - focus password input
        document.getElementById('login-pwd').focus();

        console.log('Admin Panel loaded. GAS URL:', GAS_WEBAPP_URL);
    </script>
</body>

</html>
